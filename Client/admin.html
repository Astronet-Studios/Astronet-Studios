<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astronet Studios | Admin Dashboard</title>
  <meta name="description" content="Astronet Studios admin dashboard for clients, invoices, payment status, and incoming requests." />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <link rel="canonical" href="https://astronetstudios.com/admin.html" />
  <link rel="icon" type="image/png" href="Astronet Studios Logo.png" />
  <link rel="apple-touch-icon" href="Astronet Studios Logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="portal-page" data-page="admin-dashboard">
  <div class="starfield" aria-hidden="true"></div>
  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>

  <header class="site-header">
    <a href="index.html" class="brand" aria-label="Astronet Studios home">
      <img src="Astronet Studios Logo.png" alt="Astronet Studios logo" class="brand-logo" />
    </a>
    <div class="portal-header-actions">
      <p id="admin-user" class="portal-user-label"></p>
      <button type="button" class="btn btn-secondary" id="logout-button">Logout</button>
    </div>
  </header>

  <main class="portal-shell">
    <section class="portal-hero reveal show">
      <p class="kicker">Admin Dashboard</p>
      <h1>Welcome Admin</h1>
    </section>

    <section class="portal-grid portal-grid-wide reveal show">
      <article class="portal-card">
        <p class="panel-title">Add Client</p>
        <form id="client-form" class="portal-form compact-form admin-form">
          <input type="hidden" name="clientId" />
          <label>
            <span>Company Name</span>
            <input type="text" name="companyName" required />
          </label>
          <label>
            <span>Contact Name</span>
            <input type="text" name="fullName" required />
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" required />
          </label>
          <label>
            <span>Password</span>
            <input type="text" name="password" placeholder="Optional. Leave blank to auto-generate." />
          </label>
          <label>
            <span>Website URL</span>
            <input type="url" name="websiteUrl" placeholder="https://clientsite.com" />
          </label>
          <label>
            <span>Website Status</span>
            <select name="websiteStatus">
              <option value="active">Active</option>
              <option value="maintenance">Maintenance</option>
              <option value="offline">Offline</option>
            </select>
          </label>
          <label>
            <span>Subscription Plan</span>
            <select name="subscriptionPlan">
              <option value="Tier 1 - Basic Care">Tier 1 - Basic Care ($49/month)</option>
              <option value="Tier 2 - Growth Care">Tier 2 - Growth Care ($149/month)</option>
              <option value="Tier 3 - Business Care">Tier 3 - Business Care ($299/month)</option>
              <option value="Tier 4 - Full Management">Tier 4 - Full Management ($499-$1,200/month)</option>
            </select>
          </label>
          <div class="form-button-row">
            <button type="submit" class="btn btn-primary">Save Client</button>
            <button type="button" class="btn btn-secondary" id="client-form-reset">Clear</button>
          </div>
          <p class="form-message" id="client-form-message" aria-live="polite"></p>
        </form>
      </article>

      <article class="portal-card">
        <p class="panel-title">Create Invoice</p>
        <form id="invoice-form" class="portal-form compact-form admin-form">
          <label>
            <span>Client</span>
            <select name="clientId" id="invoice-client-select" required></select>
          </label>
          <label>
            <span>Type of Site</span>
            <select name="siteType" required>
              <option value="Starter Website">Starter Website</option>
              <option value="Business Website">Business Website</option>
              <option value="Premium Website">Premium Website</option>
              <option value="E-Commerce Website">E-Commerce Website</option>
              <option value="Landing Page">Landing Page</option>
              <option value="Custom Web App">Custom Web App</option>
            </select>
          </label>
          <label>
            <span>Maintenance Tier</span>
            <select name="maintenanceTier" required>
              <option value="" selected disabled>Select a maintenance tier</option>
              <option value="Tier 1 - Basic Care">Tier 1 - Basic Care ($49/month)</option>
              <option value="Tier 2 - Growth Care">Tier 2 - Growth Care ($149/month)</option>
              <option value="Tier 3 - Business Care">Tier 3 - Business Care ($299/month)</option>
              <option value="Tier 4 - Full Management">Tier 4 - Full Management ($499-$1,200/month)</option>
            </select>
          </label>
          <div class="form-inline-pair">
            <label>
              <span>Extra Pages (Count)</span>
              <input type="number" name="extraPagesCount" min="0" value="0" />
            </label>
            <label>
              <span>Extra Pages Type</span>
              <select name="extraPagesType">
                <option value="">None</option>
                <option value="Simple Page">Simple Page</option>
                <option value="Service/Product Page">Service/Product Page</option>
                <option value="Blog/Article Template">Blog/Article Template</option>
                <option value="Landing Page">Landing Page</option>
                <option value="Portfolio/Gallery Page">Portfolio/Gallery Page</option>
                <option value="Custom Interactive Page">Custom Interactive Page</option>
              </select>
            </label>
          </div>
          <div class="form-inline-pair">
            <label>
              <span>Extra Features (Count)</span>
              <input type="number" name="extraFeaturesCount" min="0" value="0" />
            </label>
            <label>
              <span>Extra Features Type</span>
              <select name="extraFeaturesType">
                <option value="">None</option>
                <option value="Product Upload (Shopify)">Product Upload (Shopify)</option>
                <option value="App Integrations">App Integrations</option>
                <option value="Advanced Forms">Advanced Forms</option>
                <option value="Custom Animations">Custom Animations</option>
                <option value="SEO Setup">SEO Setup</option>
                <option value="Booking System">Booking System</option>
                <option value="Branding Package">Branding Package</option>
                <option value="Membership/Login System">Membership/Login System</option>
                <option value="Custom Dashboard">Custom Dashboard</option>
              </select>
            </label>
          </div>
          <label>
            <span>Additional Custom Amount (USD)</span>
            <input type="number" name="additionalAmountDollars" min="0" step="0.01" inputmode="decimal" placeholder="0.00" value="0.00" />
          </label>
          <label>
            <span>Tax Amount (USD)</span>
            <input type="number" name="taxDollars" min="0" step="0.01" inputmode="decimal" placeholder="0.00" value="0.00" />
          </label>
          <label>
            <span>Due Date</span>
            <input type="date" name="dueDate" required />
          </label>
          <label>
            <span>Invoice Description</span>
            <input type="text" name="invoiceDescription" placeholder="Scope summary, deliverables, or special notes" />
          </label>
          <label>
            <span>Auto-Generated Total (USD)</span>
            <input type="text" name="computedTotal" readonly value="$0.00" />
          </label>
          <div id="invoice-pricing-preview" class="invoice-pricing-preview" aria-live="polite"></div>
          <button type="submit" class="btn btn-primary">Create Invoice</button>
          <p class="form-message" id="invoice-form-message" aria-live="polite"></p>
        </form>
      </article>

      <article class="portal-card">
        <p class="panel-title">Create Contract</p>
        <form id="contract-form" class="portal-form compact-form admin-form">
          <label>
            <span>Client</span>
            <select name="clientId" id="contract-client-select" required></select>
          </label>
          <label>
            <span>Project Title</span>
            <input type="text" name="projectTitle" required placeholder="Main website redesign and launch" />
          </label>
          <div class="form-inline-pair">
            <label>
              <span>Type of Site</span>
              <select name="siteType" required>
                <option value="Starter Website">Starter Website</option>
                <option value="Business Website">Business Website</option>
                <option value="Premium Website">Premium Website</option>
                <option value="E-Commerce Website">E-Commerce Website</option>
                <option value="Landing Page">Landing Page</option>
                <option value="Custom Web App">Custom Web App</option>
              </select>
            </label>
            <label>
              <span>Timeline</span>
              <input type="text" name="timeline" required placeholder="4-6 weeks from kickoff" />
            </label>
          </div>
          <div class="form-inline-pair">
            <label>
              <span>Total Project Cost (USD)</span>
              <input type="number" name="totalCostDollars" required min="1" step="0.01" value="1000.00" />
            </label>
            <label>
              <span>Deductible % Due Before Start</span>
              <input type="number" name="deductiblePercent" required min="1" max="100" step="0.01" value="25.00" />
            </label>
          </div>
          <label>
            <span>Terms and Conditions (optional override)</span>
            <textarea name="termsText" rows="7" placeholder="Leave blank to use default Astronet Studios terms and conditions."></textarea>
          </label>
          <label>
            <span>Deductible Due (Auto)</span>
            <input type="text" name="deductibleDuePreview" readonly value="$250.00" />
          </label>
          <button type="submit" class="btn btn-primary">Create Contract</button>
          <p class="form-message" id="contract-form-message" aria-live="polite"></p>
        </form>
      </article>
    </section>

    <section class="portal-grid portal-grid-wide reveal show">
      <article class="portal-card">
        <p class="panel-title">Clients</p>
        <div id="admin-clients" class="table-shell"></div>
      </article>

      <article class="portal-card">
        <p class="panel-title">Invoices</p>
        <div id="admin-invoices" class="table-shell"></div>
      </article>

      <article class="portal-card">
        <p class="panel-title">Contracts</p>
        <div id="admin-contracts" class="table-shell"></div>
      </article>

      <article class="portal-card">
        <p class="panel-title">Website Change Requests</p>
        <div id="admin-change-requests" class="request-list"></div>
      </article>

      <article class="portal-card">
        <p class="panel-title">Support Questions</p>
        <div id="admin-support-questions" class="request-list"></div>
      </article>

      <article class="portal-card">
        <p class="panel-title">Subscription Change Requests</p>
        <div id="admin-subscription-requests" class="request-list"></div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal.js"></script>
</body>
</html>
